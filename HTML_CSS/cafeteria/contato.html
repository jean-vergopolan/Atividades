<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato cafeteria Cafécão</title>
    <link rel="stylesheet" href="./assets/estilo.css">
</head>
<body>
    <nav class="menu">
        <ul>
            <li><a href="index.html"><-- Voltar para o Cardápio</a></li> 
        </ul>
    </nav>

    <div class="tudo">
        <h1 class="titulo">Fale com a gente!</h1>
        <p>Envie para nós sua sugestão, reclamação, elogio ou foto do seu doguinho.</p>
        
        <form class="formulario">
            <div class="campo">
                <label for="nome">Qual seu nome?</label>
                <input id="nome" name="nome" type="text" placeholder="ex: Rex da Silva" required>
            </div>
            
            <div class="campo">
                <label for="email">Qual seu e-mail?</label>
                <input id="email" type="email" name="email" placeholder="ex: cachorrao@auau.com" required>
            </div>
            
            <div class="campo">
                <label for="telefone">Qual seu telefone?</label>
                <input id="telefone" type="tel" name="telefone" placeholder="ex: 41 91234-5678">
            </div>
            
            <div class="campo">
                <label for="assunto">Qual o assunto do contato?</label>
                <select id="assunto" required>
                    <option value="">Selecione uma opção</option>
                    <option value="sugestão">Sugestão</option>
                    <option value="reclamacao">Reclamação</option>
                    <option value="elogio">Elogio</option>
                    <option value="outros">Outros</option>
                </select>
            </div>
            
            <div class="campo">
                <label for="mensagem">Digite sua mensagem para nós:</label>
                <textarea id="mensagem" placeholder="Escreva aqui..." required></textarea>
            </div>
            
            <button type="submit" class="botaocontato" style="border: none; cursor: pointer; width: 100%; margin-top: 10px;">Enviar Mensagem</button>
        </form>
    </div>
</body>
